<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Create account — Robinhood</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/app.css">
</head><body>
<div class="auth-wrap"><div class="auth-card">
<div class="brand" style="justify-content:center;padding-bottom:8px"><span class="brand-dot"></span>Robinhood</div>
<h1>Create account</h1>
<div id="err" class="form-error hidden"></div>
<form id="f">
  <div class="row"><div class="field" style="flex:1"><label>First name</label><input name="first_name" required></div>
  <div class="field" style="flex:1"><label>Last name</label><input name="last_name" required></div></div>
  <div class="field"><label>Email</label><input name="email" type="email" required></div>
  <div class="field"><label>Password</label><input name="password" type="password" minlength="6" required></div>
  <button class="btn btn-primary btn-block" type="submit">Create account</button>
</form>
<div class="auth-links">Have an account? <a href="login.html">Sign in</a></div>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/auth.js"></script>
<script>
document.getElementById("f").onsubmit = async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const err = document.getElementById("err"); err.classList.add("hidden");
  const { error } = await sb.auth.signUp({
    email: fd.get("email"), password: fd.get("password"),
    options: { emailRedirectTo: location.origin + "/static/login.html",
      data: { first_name: fd.get("first_name"), last_name: fd.get("last_name") } }
  });
  if (error) { err.textContent = error.message; err.classList.remove("hidden"); return; }
  const { data: { session } } = await sb.auth.getSession();
  if (session) location.href = pathTo("app/dashboard.html");
  else { err.textContent = "Check your email to confirm your account, then sign in."; err.classList.remove("hidden"); }
};
</script>
</body></html>
