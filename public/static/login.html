<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in — Robinhood</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/app.css">
</head><body>
<div class="auth-wrap"><div class="auth-card">
<div class="brand" style="justify-content:center;padding-bottom:8px"><span class="brand-dot"></span>Robinhood</div>
<h1>Sign in</h1>
<div id="err" class="form-error hidden"></div>
<form id="f">
  <div class="field"><label>Email</label><input name="email" type="email" required></div>
  <div class="field"><label>Password</label><input name="password" type="password" required></div>
  <button class="btn btn-primary btn-block" type="submit">Sign in</button>
</form>
<div class="auth-links"><a href="forgot-password.html">Forgot password?</a></div>
<div class="auth-links">Don't have an account? <a href="register.html">Sign up</a></div>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/auth.js"></script>
<script>
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) location.href = pathTo("app/dashboard.html");
})();
document.getElementById("f").onsubmit = async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const err = document.getElementById("err"); err.classList.add("hidden");
  const { error } = await sb.auth.signInWithPassword({ email: fd.get("email"), password: fd.get("password") });
  if (error) { err.textContent = error.message; err.classList.remove("hidden"); return; }
  location.href = pathTo("app/dashboard.html");
};
</script>
</body></html>
