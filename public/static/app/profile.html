<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Profile — Robinhood</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="../assets/css/app.css"></head><body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script><script src="../assets/js/supabase.js"></script><script src="../assets/js/auth.js"></script><script src="../assets/js/shell.js"></script><script src="../assets/js/prices.js"></script><script src="../assets/js/formspark.js"></script><script src="../assets/js/wallet.js"></script>
<script>
(async () => { const session = await requireAuth(); if(!session) return; await renderShell({active:"profile",session}); const c=document.getElementById("content"); const { data: prof } = await sb.from("profiles").select("*").maybeSingle();
c.innerHTML = `<h1>Profile</h1><div class="card"><form id="pf"><div class="row"><div class="field" style="flex:1"><label>First name</label><input name="first_name" value="${esc(prof?.first_name||"")}"></div><div class="field" style="flex:1"><label>Last name</label><input name="last_name" value="${esc(prof?.last_name||"")}"></div></div><div class="field"><label>Phone</label><input name="phone" value="${esc(prof?.phone||"")}"></div><div class="field"><label>Address</label><input name="address" value="${esc(prof?.address||"")}"></div><button class="btn btn-primary" type="submit">Save</button><span id="ok" class="green hidden" style="margin-left:12px">Saved</span></form></div>`;
document.getElementById("pf").onsubmit=async e=>{e.preventDefault();const fd=Object.fromEntries(new FormData(e.target));const u=(await sb.auth.getUser()).data.user;await sb.from("profiles").upsert({user_id:u.id,...fd});document.getElementById("ok").classList.remove("hidden");}; })();
</script></body></html>
