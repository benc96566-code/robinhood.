<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Account — Robinhood</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="../assets/css/app.css"></head><body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script><script src="../assets/js/supabase.js"></script><script src="../assets/js/auth.js"></script><script src="../assets/js/shell.js"></script><script src="../assets/js/prices.js"></script><script src="../assets/js/formspark.js"></script><script src="../assets/js/wallet.js"></script>
<script>
(async () => { const session = await requireAuth(); if(!session) return; await renderShell({active:"account",session}); const c=document.getElementById("content"); const { data: acc } = await sb.from("accounts").select("*").maybeSingle();
const { data: prof } = await sb.from("profiles").select("*").maybeSingle();
c.innerHTML = `<h1>Account</h1><div class="grid grid-2"><div class="card"><div class="card-title">Total Balance</div><div class="card-value mono">${money(acc?.balance||0)}</div></div><div class="card"><div class="card-title">Buying Power</div><div class="card-value mono green">${money(acc?.buying_power||0)}</div></div></div><div class="card"><h3>Profile</h3><p><b>Name:</b> ${esc(prof?.first_name||"")} ${esc(prof?.last_name||"")}</p><p><b>Email:</b> ${esc((await sb.auth.getUser()).data.user.email)}</p><a href="profile.html" class="btn btn-ghost btn-sm">Edit profile</a></div><div class="card"><h3>Actions</h3><div class="row" style="flex-wrap:wrap"><a href="deposit/index.html" class="btn btn-primary btn-sm">Deposit</a><a href="withdraw.html" class="btn btn-secondary btn-sm">Withdraw</a><a href="security.html" class="btn btn-ghost btn-sm">Security</a><button class="btn btn-danger btn-sm" onclick="signOutAndGo()">Sign out</button></div></div>`; })();
</script></body></html>
