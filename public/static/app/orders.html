<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Orders — Robinhood</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="../assets/css/app.css"></head><body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script><script src="../assets/js/supabase.js"></script><script src="../assets/js/auth.js"></script><script src="../assets/js/shell.js"></script><script src="../assets/js/prices.js"></script><script src="../assets/js/formspark.js"></script><script src="../assets/js/wallet.js"></script>
<script>
(async () => { const session = await requireAuth(); if(!session) return; await renderShell({active:"orders",session}); const c=document.getElementById("content"); const { data: orders } = await sb.from("orders").select("*").order("created_at",{ascending:false}).limit(100);
c.innerHTML = `<h1>Orders</h1><div class="card"><table><thead><tr><th>Date</th><th>Symbol</th><th>Side</th><th>Qty</th><th>Price</th><th>Status</th></tr></thead><tbody>${(orders||[]).map(o=>`<tr><td>${new Date(o.created_at).toLocaleString()}</td><td>${o.symbol}</td><td class="${o.side==="buy"?"green":"red"}">${o.side.toUpperCase()}</td><td class="mono">${o.quantity}</td><td class="mono">${money(o.price)}</td><td><span class="badge badge-${o.status==="filled"?"confirmed":"pending"}">${o.status}</span></td></tr>`).join("")||`<tr><td colspan="6" class="muted" style="text-align:center;padding:40px">No orders</td></tr>`}</tbody></table></div>`; })();
</script></body></html>
