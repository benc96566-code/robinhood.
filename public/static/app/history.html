<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>History — Robinhood</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="../assets/css/app.css"></head><body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script><script src="../assets/js/supabase.js"></script><script src="../assets/js/auth.js"></script><script src="../assets/js/shell.js"></script><script src="../assets/js/prices.js"></script><script src="../assets/js/formspark.js"></script><script src="../assets/js/wallet.js"></script>
<script>
(async () => { const session = await requireAuth(); if(!session) return; await renderShell({active:"history",session}); const c=document.getElementById("content"); const { data: tx } = await sb.from("transactions").select("*").order("created_at",{ascending:false}).limit(200);
c.innerHTML = `<h1>History</h1><div class="card"><table><thead><tr><th>Date</th><th>Type</th><th>Description</th><th>Amount</th></tr></thead><tbody>${(tx||[]).map(t=>`<tr><td>${new Date(t.created_at).toLocaleString()}</td><td><span class="badge badge-confirmed">${t.kind}</span></td><td>${esc(t.label)}<div class="muted">${esc(t.sub||"")}</div></td><td class="mono ${t.amount>=0?"green":"red"}">${money(t.amount)}</td></tr>`).join("")||`<tr><td colspan="4" class="muted" style="text-align:center;padding:40px">No transactions</td></tr>`}</tbody></table></div>`; })();
</script></body></html>
