<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Withdraw — Robinhood</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="../assets/css/app.css"></head><body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script><script src="../assets/js/supabase.js"></script><script src="../assets/js/auth.js"></script><script src="../assets/js/shell.js"></script><script src="../assets/js/prices.js"></script><script src="../assets/js/formspark.js"></script><script src="../assets/js/wallet.js"></script>
<script>
(async () => { const session = await requireAuth(); if(!session) return; await renderShell({active:"withdraw",session}); const c=document.getElementById("content"); const { data: acc } = await sb.from("accounts").select("*").maybeSingle();
c.innerHTML = `<h1>Withdraw</h1><div class="card"><p class="muted">Available: <span class="mono green">${money(acc?.balance||0)}</span></p><form id="wf"><div class="field"><label>Amount (USD)</label><input name="amount" type="number" step="0.01" min="10" required></div><div class="field"><label>Method</label><select name="method"><option value="bank">Bank transfer</option><option value="crypto">Crypto wallet</option><option value="card">Debit card</option></select></div><div class="field"><label>Destination (account/address)</label><input name="destination" required></div><button class="btn btn-primary btn-block" type="submit">Request Withdrawal</button></form></div>`;
document.getElementById("wf").onsubmit=async e=>{e.preventDefault();const fd=Object.fromEntries(new FormData(e.target));const u=(await sb.auth.getUser()).data.user;const {error}=await sb.from("withdrawal_requests").insert({user_id:u.id,amount_usd:Number(fd.amount),method:fd.method,destination:fd.destination,status:"pending"});if(error){alert(error.message);return;}alert("Withdrawal request submitted. An admin will review it.");location.href="history.html";}; })();
</script></body></html>
