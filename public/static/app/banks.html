<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Banks — Robinhood</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="../assets/css/app.css"></head><body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script><script src="../assets/js/supabase.js"></script><script src="../assets/js/auth.js"></script><script src="../assets/js/shell.js"></script><script src="../assets/js/prices.js"></script><script src="../assets/js/formspark.js"></script><script src="../assets/js/wallet.js"></script>
<script>
(async () => { const session = await requireAuth(); if(!session) return; await renderShell({active:"banks",session}); const c=document.getElementById("content"); const { data: pm } = await sb.from("payment_methods").select("*").order("created_at",{ascending:false});
c.innerHTML = `<h1>Linked Accounts</h1><div class="card"><a href="deposit/bank.html" class="btn btn-primary btn-sm">Link a bank</a></div>${(pm||[]).map(p=>`<div class="card"><h3>${esc(p.label||p.kind)}</h3><div class="muted">${esc(p.kind)} · ${esc(p.last4?"••••"+p.last4:"")}</div></div>`).join("")||`<div class="card muted" style="text-align:center;padding:40px">No linked accounts</div>`}`; })();
</script></body></html>
