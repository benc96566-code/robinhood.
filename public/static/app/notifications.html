<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Notifications — Robinhood</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="../assets/css/app.css"></head><body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script><script src="../assets/js/supabase.js"></script><script src="../assets/js/auth.js"></script><script src="../assets/js/shell.js"></script><script src="../assets/js/prices.js"></script><script src="../assets/js/formspark.js"></script><script src="../assets/js/wallet.js"></script>
<script>
(async () => { const session = await requireAuth(); if(!session) return; await renderShell({active:"notifications",session}); const c=document.getElementById("content"); const { data: notes } = await sb.from("notifications").select("*").order("created_at",{ascending:false}).limit(100);
c.innerHTML = `<h1>Notifications</h1>${(notes||[]).map(n=>`<div class="card"><h3>${esc(n.title)}</h3><p>${esc(n.body||"")}</p><div class="muted">${new Date(n.created_at).toLocaleString()}</div></div>`).join("")||`<div class="card muted" style="text-align:center;padding:40px">No notifications</div>`}`; })();
</script></body></html>
