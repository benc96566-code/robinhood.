<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin — Withdrawals</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="../assets/css/app.css"></head><body>
<div class="shell"><aside class="sidebar"><div class="brand"><span class="brand-dot"></span>Admin</div><nav class="nav"><a href="index.html" id="n-index">◆ Overview</a><a href="deposits.html" id="n-deposits">↓ Deposits</a><a href="withdrawals.html" id="n-withdrawals">↑ Withdrawals</a><a href="users.html" id="n-users">☺ Users</a><div class="nav-section">Back</div><a href="../app/dashboard.html">← User app</a></nav><div style="margin-top:24px;padding:12px"><button class="btn btn-ghost btn-sm btn-block" onclick="signOutAndGo()">Sign out</button></div></aside><main class="main"><div id="content"></div></main></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script><script src="../assets/js/supabase.js"></script><script src="../assets/js/auth.js"></script><script src="../assets/js/shell.js"></script><script src="../assets/js/prices.js"></script>
<script>document.getElementById("n-withdrawals")?.classList.add("active");
(async () => { const session = await requireAuth({admin:true}); if(!session) return; const c=document.getElementById("content"); async function load(){
  const { data } = await sb.from("withdrawal_requests").select("*").order("created_at",{ascending:false});
  c.innerHTML = `<h1>Withdrawals</h1><div class="card"><table><thead><tr><th>Date</th><th>User</th><th>Method</th><th>Destination</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead><tbody>${(data||[]).map(d=>`<tr><td>${new Date(d.created_at).toLocaleString()}</td><td class="mono" style="font-size:11px">${d.user_id.slice(0,8)}</td><td>${d.method}</td><td class="mono" style="font-size:11px">${esc(d.destination)}</td><td class="mono">${money(d.amount_usd)}</td><td><span class="badge badge-${d.status==="confirmed"?"confirmed":d.status==="rejected"?"rejected":"pending"}">${d.status}</span></td><td>${d.status==="pending"?`<button class="btn btn-sm btn-primary" onclick="conf(\x27${d.id}\x27)">Confirm</button> <button class="btn btn-sm btn-danger" onclick="rej(\x27${d.id}\x27)">Reject</button>`:""}</td></tr>`).join("")}</tbody></table></div>`;
}
window.conf = async id => { const {error} = await sb.rpc("confirm_withdrawal",{_request_id:id}); if(error)alert(error.message); load(); };
window.rej = async id => { const r = prompt("Reason?")||""; const {error} = await sb.rpc("reject_withdrawal",{_request_id:id,_reason:r}); if(error)alert(error.message); load(); };
load(); })();
</script></body></html>
