<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>New password — Robinhood</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/app.css">
</head><body>
<div class="auth-wrap"><div class="auth-card">
<h1>Set new password</h1>
<div id="err" class="form-error hidden"></div>
<div id="ok" class="form-success hidden">Password updated. <a href="login.html">Sign in</a>.</div>
<form id="f">
  <div class="field"><label>New password</label><input name="password" type="password" minlength="6" required></div>
  <button class="btn btn-primary btn-block" type="submit">Update password</button>
</form>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="assets/js/supabase.js"></script>
<script>
document.getElementById("f").onsubmit = async (e) => {
  e.preventDefault();
  const pw = new FormData(e.target).get("password");
  const { error } = await sb.auth.updateUser({ password: pw });
  const err = document.getElementById("err"), ok = document.getElementById("ok");
  err.classList.add("hidden"); ok.classList.add("hidden");
  if (error) { err.textContent = error.message; err.classList.remove("hidden"); }
  else ok.classList.remove("hidden");
};
</script>
</body></html>
