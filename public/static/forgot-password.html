<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forgot password — Robinhood</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/app.css">
</head><body>
<div class="auth-wrap"><div class="auth-card">
<h1>Reset password</h1>
<div id="err" class="form-error hidden"></div>
<div id="ok" class="form-success hidden">Check your email for a reset link.</div>
<form id="f">
  <div class="field"><label>Email</label><input name="email" type="email" required></div>
  <button class="btn btn-primary btn-block" type="submit">Send reset link</button>
</form>
<div class="auth-links"><a href="login.html">Back to sign in</a></div>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="assets/js/supabase.js"></script>
<script>
document.getElementById("f").onsubmit = async (e) => {
  e.preventDefault();
  const email = new FormData(e.target).get("email");
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: location.origin + "/static/reset-password.html" });
  const err = document.getElementById("err"), ok = document.getElementById("ok");
  err.classList.add("hidden"); ok.classList.add("hidden");
  if (error) { err.textContent = error.message; err.classList.remove("hidden"); }
  else ok.classList.remove("hidden");
};
</script>
</body></html>
